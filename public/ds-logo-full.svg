<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowText" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="420" height="100" fill="#080A0E"/>

  <!-- EYE MARK centered at 50,50 -->
  <g transform="translate(50,50)">
    <!-- Outer orbit ring dashed -->
    <circle cx="0" cy="0" r="38" fill="none" stroke="#6366F1" stroke-width="0.4" opacity="0.18" stroke-dasharray="3 7"/>
    <!-- Eye almond shape -->
    <path d="M-32,0 C-19,-17 19,-17 32,0 C19,17 -19,17 -32,0 Z"
          fill="none" stroke="#6366F1" stroke-width="2" filter="url(#glow)"/>
    <!-- Iris ring -->
    <circle cx="0" cy="0" r="11" fill="none" stroke="#6366F1" stroke-width="1.2" opacity="0.55" filter="url(#glow)"/>
    <!-- Pupil outer — GOLD -->
    <circle cx="0" cy="0" r="6.5" fill="#FFD700" opacity="0.12"/>
    <circle cx="0" cy="0" r="6.5" fill="none" stroke="#FFD700" stroke-width="1.6" filter="url(#glow)"/>
    <!-- Center dot — GOLD -->
    <circle cx="0" cy="0" r="2.8" fill="#FFD700" filter="url(#glowStrong)"/>
    <!-- Horizontal axis ticks -->
    <line x1="-32" y1="0" x2="-25" y2="0" stroke="#6366F1" stroke-width="2.2" filter="url(#glow)"/>
    <line x1="25" y1="0" x2="32" y2="0" stroke="#6366F1" stroke-width="2.2" filter="url(#glow)"/>
    <!-- Vertical minor ticks -->
    <line x1="0" y1="-17" x2="0" y2="-12" stroke="#6366F1" stroke-width="1" opacity="0.45"/>
    <line x1="0" y1="12" x2="0" y2="17" stroke="#6366F1" stroke-width="1" opacity="0.45"/>
    <!-- Corner reticle marks -->
    <line x1="22" y1="-11" x2="25" y2="-14" stroke="#6366F1" stroke-width="0.9" opacity="0.5"/>
    <line x1="-22" y1="-11" x2="-25" y2="-14" stroke="#6366F1" stroke-width="0.9" opacity="0.5"/>
    <line x1="22" y1="11" x2="25" y2="14" stroke="#6366F1" stroke-width="0.9" opacity="0.5"/>
    <line x1="-22" y1="11" x2="-25" y2="14" stroke="#6366F1" stroke-width="0.9" opacity="0.5"/>
  </g>

  <!-- WORDMARK -->
  <!-- DRIFT — small, muted, wide tracking -->
  <text x="104" y="38"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    font-weight="400"
    fill="#4B5563"
    letter-spacing="7">DRIFT</text>

  <!-- Thin rule -->
  <line x1="104" y1="44" x2="408" y2="44" stroke="#1A1D23" stroke-width="0.8"/>

  <!-- SENTINEL — dominant, indigo, heavy -->
  <text x="101" y="76"
    font-family="'Courier New', Courier, monospace"
    font-size="36"
    font-weight="900"
    fill="#6366F1"
    letter-spacing="2.5"
    filter="url(#glowText)">SENTINEL</text>

</svg>
