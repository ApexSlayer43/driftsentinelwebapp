<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="100" height="100" fill="#080A0E"/>

  <g transform="translate(50,50)">
    <!-- Outer orbit rings -->
    <circle cx="0" cy="0" r="44" fill="none" stroke="#6366F1" stroke-width="0.4" opacity="0.1"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#6366F1" stroke-width="0.4" opacity="0.18" stroke-dasharray="3 7"/>

    <!-- Eye almond -->
    <path d="M-34,0 C-20,-19 20,-19 34,0 C20,19 -20,19 -34,0 Z"
          fill="none" stroke="#6366F1" stroke-width="2.2" filter="url(#glow)"/>

    <!-- Iris -->
    <circle cx="0" cy="0" r="13" fill="none" stroke="#6366F1" stroke-width="1.4" opacity="0.55" filter="url(#glow)"/>

    <!-- Pupil — GOLD -->
    <circle cx="0" cy="0" r="7.5" fill="#FFD700" opacity="0.1"/>
    <circle cx="0" cy="0" r="7.5" fill="none" stroke="#FFD700" stroke-width="1.8" filter="url(#glow)"/>

    <!-- Center dot — GOLD -->
    <circle cx="0" cy="0" r="3.2" fill="#FFD700" filter="url(#glowStrong)"/>

    <!-- Horizontal ticks -->
    <line x1="-34" y1="0" x2="-26" y2="0" stroke="#6366F1" stroke-width="2.5" filter="url(#glow)"/>
    <line x1="26" y1="0" x2="34" y2="0" stroke="#6366F1" stroke-width="2.5" filter="url(#glow)"/>

    <!-- Vertical ticks -->
    <line x1="0" y1="-19" x2="0" y2="-13" stroke="#6366F1" stroke-width="1.2" opacity="0.5"/>
    <line x1="0" y1="13" x2="0" y2="19" stroke="#6366F1" stroke-width="1.2" opacity="0.5"/>

    <!-- Corner reticle -->
    <line x1="24" y1="-13" x2="28" y2="-17" stroke="#6366F1" stroke-width="1.1" opacity="0.55"/>
    <line x1="-24" y1="-13" x2="-28" y2="-17" stroke="#6366F1" stroke-width="1.1" opacity="0.55"/>
    <line x1="24" y1="13" x2="28" y2="17" stroke="#6366F1" stroke-width="1.1" opacity="0.55"/>
    <line x1="-24" y1="13" x2="-28" y2="17" stroke="#6366F1" stroke-width="1.1" opacity="0.55"/>
  </g>
</svg>
